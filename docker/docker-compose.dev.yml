services:
  editor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://host.docker.internal:8080}
      VITE_DOCUMENTS_API_BASE_URL: ${VITE_DOCUMENTS_API_BASE_URL:-http://localhost:8080/api/documents/v1}
      VITE_SSO_BASE_URL: ${VITE_SSO_BASE_URL:-http://localhost:8080}
      VITE_START_FRONTEND_URL: ${VITE_START_FRONTEND_URL:-http://localhost:3000}
      VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:5173}
      VITE_PORT: ${VITE_PORT:-5173}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../:/app
      - editor_node_modules:/app/node_modules

volumes:
  editor_node_modules:
